<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>req.to</title>
<meta property="og:title" content="req.to">
<meta property="og:image" content="https://req.to/req.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://req.to">
<meta name="twitter:card" content="summary">
<meta name="twitter:image" content="https://req.to/req.png">
<link rel="icon" type="image/png" href="/favicon.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'SF Mono',SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace;
  background:#0d1117;color:#e6edf3;
}
#output{
  padding:1.5rem;white-space:pre-wrap;word-wrap:break-word;
  font-size:14px;line-height:1.6;tab-size:4;
}
.center{display:flex;justify-content:center;align-items:center;height:100%;text-align:center}
.landing h1{font-size:2rem;font-weight:300;letter-spacing:.1em}
.error{font-size:4rem;font-weight:200;color:#484f58;letter-spacing:.2em}
</style>
</head>
<body>
<script>
(function(){
  var hash=window.location.hash.slice(1);
  if(!hash){
    document.body.innerHTML='<div class="center landing"><h1>req.to</h1></div>';
    return;
  }
  var path=hash;
  if(!/^[A-Za-z0-9_\-.]+$/.test(path)){show404();return}
  var chunks=path.split('.');
  try{
    var decoded=chunks.map(function(chunk){
      if(!chunk)return'';
      var b64=chunk.replace(/-/g,'+').replace(/_/g,'/');
      var pad=b64.length%4;
      if(pad===1)throw new Error('invalid');
      if(pad===2)b64+='==';
      if(pad===3)b64+='=';
      var bin=atob(b64);
      var bytes=new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
      return new TextDecoder('utf-8').decode(bytes);
    });
    var el=document.createElement('pre');
    el.id='output';
    el.textContent=decoded.join('\n\n');
    document.body.appendChild(el);
  }catch(e){show404()}
  function show404(){
    document.body.innerHTML='<div class="center"><span class="error">404</span></div>';
  }
})();
</script>
</body>
</html>
